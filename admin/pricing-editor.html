<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Pricing - Serenity Spa Admin</title>
  <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body class="admin-page">
  <nav class="admin-nav">
    <div class="nav-brand">
      <h1>Serenity Admin</h1>
    </div>
    <ul class="nav-menu">
      <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
      <li><a href="treatments-editor.html" class="nav-link">Treatments</a></li>
      <li><a href="pricing-editor.html" class="nav-link active">Pricing</a></li>
      <li><a href="hours-editor.html" class="nav-link">Hours & Contact</a></li>
      <li><a href="team-editor.html" class="nav-link">Team</a></li>
      <li><a href="faq-editor.html" class="nav-link">FAQ</a></li>
      <li><a href="knowledge-base-editor.html" class="nav-link">Knowledge Base</a></li>
    </ul>
    <div class="nav-user">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-logout">Sign Out</button>
    </div>
  </nav>

  <main class="admin-main">
    <div class="dashboard-header">
      <h2>Edit Pricing & Memberships</h2>
      <p class="subtitle">Manage membership tiers and pricing</p>
    </div>

    <div id="pricing-tiers" class="editor-list">
      <p style="text-align: center; color: #999;">Loading pricing tiers...</p>
    </div>

    <div class="editor-section">
      <h3>Edit Membership Tier</h3>
      <form id="pricing-form">
        <div class="form-group">
          <label for="tier-name">Tier Name *</label>
          <input type="text" id="tier-name" name="tierName" required placeholder="e.g., Basic, Wellness Member">
        </div>

        <div class="form-group">
          <label for="tier-price">Monthly Price ($) *</label>
          <input type="number" id="tier-price" name="tierPrice" required min="0" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="tier-description">Description *</label>
          <textarea id="tier-description" name="tierDescription" required placeholder="Describe this membership tier..."></textarea>
        </div>

        <div class="form-group">
          <label for="tier-benefits">Benefits (one per line) *</label>
          <textarea id="tier-benefits" name="tierBenefits" required placeholder="10% off treatments&#10;Priority booking&#10;Monthly newsletter"></textarea>
        </div>

        <div class="form-buttons">
          <button type="button" class="btn btn-secondary" onclick="PricingEditor.resetForm()">Clear</button>
          <button type="submit" class="btn btn-primary">Update Tier</button>
        </div>
      </form>
    </div>

    <div class="editor-section">
      <h3>FAQ - Pricing Questions</h3>
      <div id="pricing-faq" class="editor-list">
        <p style="text-align: center; color: #999;">Loading FAQ items...</p>
      </div>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-main.js"></script>
  <script src="js/pricing-editor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Treatments - Serenity Spa Admin</title>
  <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body class="admin-page">
  <nav class="admin-nav">
    <div class="nav-brand">
      <h1>Serenity Admin</h1>
    </div>
    <ul class="nav-menu">
      <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
      <li><a href="treatments-editor.html" class="nav-link active">Treatments</a></li>
      <li><a href="pricing-editor.html" class="nav-link">Pricing</a></li>
      <li><a href="hours-editor.html" class="nav-link">Hours & Contact</a></li>
      <li><a href="team-editor.html" class="nav-link">Team</a></li>
      <li><a href="faq-editor.html" class="nav-link">FAQ</a></li>
      <li><a href="knowledge-base-editor.html" class="nav-link">Knowledge Base</a></li>
    </ul>
    <div class="nav-user">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-logout">Sign Out</button>
    </div>
  </nav>

  <main class="admin-main">
    <div class="dashboard-header">
      <h2>Edit Treatments</h2>
      <p class="subtitle">Manage spa treatment offerings</p>
    </div>

    <div class="editor-list" id="treatments-list">
      <p style="text-align: center; color: #999;">Loading treatments...</p>
    </div>

    <div class="editor-section">
      <h3>Add New Treatment</h3>
      <form id="new-treatment-form" class="treatment-form">
        <div class="form-row">
          <div class="form-group">
            <label for="treatment-name">Treatment Name *</label>
            <input type="text" id="treatment-name" name="name" required placeholder="e.g., Swedish Massage">
          </div>
          <div class="form-group">
            <label for="treatment-category">Category *</label>
            <select id="treatment-category" name="category" required>
              <option value="">Select Category</option>
              <option value="massage">Massage</option>
              <option value="skin">Skin Care</option>
              <option value="wellness">Wellness</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="treatment-description">Description *</label>
          <textarea id="treatment-description" name="description" required placeholder="Describe the treatment benefits and experience..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="treatment-duration">Duration (minutes) *</label>
            <input type="number" id="treatment-duration" name="duration" required min="15" step="15" placeholder="60">
          </div>
          <div class="form-group">
            <label for="treatment-price">Price ($) *</label>
            <input type="number" id="treatment-price" name="price" required min="0" step="0.01" placeholder="99.00">
          </div>
        </div>

        <div class="form-buttons">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('new-treatment-form').reset()">Clear</button>
          <button type="submit" class="btn btn-primary">Add Treatment</button>
        </div>
      </form>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-main.js"></script>
  <script src="js/treatments-editor.js"></script>
</body>
</html>

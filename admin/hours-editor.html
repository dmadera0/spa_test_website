<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Hours & Contact - Serenity Spa Admin</title>
  <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body class="admin-page">
  <nav class="admin-nav">
    <div class="nav-brand">
      <h1>Serenity Admin</h1>
    </div>
    <ul class="nav-menu">
      <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
      <li><a href="treatments-editor.html" class="nav-link">Treatments</a></li>
      <li><a href="pricing-editor.html" class="nav-link">Pricing</a></li>
      <li><a href="hours-editor.html" class="nav-link active">Hours & Contact</a></li>
      <li><a href="team-editor.html" class="nav-link">Team</a></li>
      <li><a href="faq-editor.html" class="nav-link">FAQ</a></li>
      <li><a href="knowledge-base-editor.html" class="nav-link">Knowledge Base</a></li>
    </ul>
    <div class="nav-user">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-logout">Sign Out</button>
    </div>
  </nav>

  <main class="admin-main">
    <div class="dashboard-header">
      <h2>Edit Hours & Contact</h2>
      <p class="subtitle">Manage business hours, location, and contact information</p>
    </div>

    <div class="editor-section">
      <h3>Contact Information</h3>
      <form id="contact-form">
        <div class="form-group">
          <label for="business-name">Business Name *</label>
          <input type="text" id="business-name" name="businessName" required placeholder="Serenity Spa & Wellness">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" required placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="info@serenityspawellness.com">
          </div>
        </div>

        <div class="form-group">
          <label for="address">Street Address *</label>
          <input type="text" id="address" name="address" required placeholder="2847 Wellness Drive">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" required placeholder="Portland">
          </div>
          <div class="form-group">
            <label for="state">State *</label>
            <input type="text" id="state" name="state" required placeholder="OR">
          </div>
          <div class="form-group">
            <label for="zip">ZIP Code *</label>
            <input type="text" id="zip" name="zip" required placeholder="97214">
          </div>
        </div>

        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">Save Contact Info</button>
        </div>
      </form>
    </div>

    <div class="editor-section">
      <h3>Business Hours</h3>
      <form id="hours-form">
        <div id="hours-list"></div>
        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">Save Hours</button>
        </div>
      </form>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-main.js"></script>
  <script src="js/hours-editor.js"></script>
</body>
</html>
